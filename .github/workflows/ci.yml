# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (all ABIs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # assembleDebug compiles the native lib via CMake for every ABI in the
      # app's abiFilters, so this is the cross-ABI compile gate. The androidTest
      # APK is also built for the emulator job.
      - name: Assemble app + native lib + test APK
        run: |
          chmod +x tests/gradlew
          cd tests && ./gradlew --no-daemon assembleDebug assembleDebugAndroidTest

  instrumented-test:
    name: Suite (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 31, 34, 35]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # Hardware acceleration for the emulator.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run arthook suite on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          disable-animations: true
          # Write logcat + tombstones INTO the report dir, which uploads
          # reliably. Logcat is dumped once after the run (no background proc).
          script: |
            RPT="tests/app/build/reports/androidTests/connected"
            chmod +x tests/gradlew
            ( cd tests && ./gradlew --no-daemon connectedDebugAndroidTest ); RC=$?
            mkdir -p "$RPT"
            adb logcat -d -b main,system,crash > "$RPT/logcat-api${{ matrix.api-level }}.txt" 2>&1 || true
            adb root >/dev/null 2>&1 && adb wait-for-device || true
            adb pull /data/tombstones "$RPT/tombstones-api${{ matrix.api-level }}" >/dev/null 2>&1 || true
            echo "::group::arthook init + failures + crash (logcat)"
            grep -aiE 'arthook|fatal|signal|backtrace|sigsegv|sigabrt|libart|^F ' "$RPT/logcat-api${{ matrix.api-level }}.txt" | tail -n 400 || true
            echo "::endgroup::"
            exit $RC
      - name: Upload test report (incl. logcat + tombstones)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arthook-test-api${{ matrix.api-level }}
          path: tests/app/build/reports/androidTests/connected/
          if-no-files-found: ignore
