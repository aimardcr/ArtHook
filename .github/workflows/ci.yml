# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (all ABIs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # assembleDebug compiles the native lib via CMake for every ABI in the
      # app's abiFilters, so this is the cross-ABI compile gate. The androidTest
      # APK is also built for the emulator job.
      - name: Assemble app + native lib + test APK
        run: |
          chmod +x tests/gradlew
          cd tests && ./gradlew --no-daemon assembleDebug assembleDebugAndroidTest

  instrumented-test:
    name: Suite (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 31, 34, 35]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      # Hardware acceleration for the emulator.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run arthook suite on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: |
            chmod +x tests/gradlew
            cd tests && ./gradlew --no-daemon connectedDebugAndroidTest
